name: pre-commit

on:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #v3
        with:
          fetch-depth: 0

      # CI validates the repo scripts directly so the checks always match the
      # repo-root toolchain and config. Local pre-commit hooks remain optional
      # convenience checks for contributors editing changed files.
      - run: yarn
      - run: yarn format-check
      - run: yarn cspell
