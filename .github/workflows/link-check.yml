name: link-check

# Weekly external-link audit for the docs content. This is report-only and is
# never a required PR gate: it runs on a schedule and on manual dispatch only,
# and every step is non-fatal (continue-on-error) so a flaky or rate-limited
# external host can never block contributors. Use the run summary to triage
# genuinely broken links.

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check external links
        continue-on-error: true
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Only chase external (http/https) links; internal routing is covered
          # by the Docusaurus build, not by this audit.
          args: --no-progress --scheme https --scheme http content/docs/**/*.md content/docs/**/*.mdx
          fail: false
