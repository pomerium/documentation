repos:
  - repo: local
    hooks:
      # Local-only convenience hook for changed docs files. CI runs the repo
      # scripts directly (`yarn format-check` and `yarn cspell`) instead of
      # invoking pre-commit/action.
      - id: prettier
        name: prettier
        language: script
        entry: scripts/prettier-precommit.bash
        files: ^content\/.*$
        exclude: content/docs/deploy/k8s/reference.md
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v8.17.0
    hooks:
      - id: cspell
