<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img"
     aria-labelledby="title desc" font-family="Georgia, 'Times New Roman', serif">
  <title id="title">Paperless-ngx request surface, with and without Pomerium</title>
  <desc id="desc">Two panels. Without Pomerium, the public internet reaches the
    Paperless-ngx Django app directly, so its own login is the only barrier. With
    Pomerium, the internet reaches Pomerium first; Pomerium authenticates against
    the identity provider and enforces policy, and only allowed requests reach
    Paperless, which keeps its own login behind that gate.</desc>
  <style>
    :root { color-scheme: light dark; }
    .bg { fill: #fffff8; }
    .ink { fill: #666; }
    .ink-stroke { stroke: #666; fill: none; }
    .accent { fill: #b5402a; }
    .accent-stroke { stroke: #b5402a; fill: none; }
    .box { fill: none; stroke: currentColor; color: #666; }
    .heading { fill: currentColor; color: #333; font-weight: bold; }
    text { fill: currentColor; color: #666; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1b1b1b; }
      .ink { fill: #bbb; }
      .ink-stroke { stroke: #bbb; }
      .box { color: #bbb; }
      .heading { color: #eee; }
      text { color: #bbb; }
      .accent { fill: #e8765c; }
      .accent-stroke { stroke: #e8765c; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="720" height="360"/>

  <!-- divider between panels -->
  <line x1="360" y1="36" x2="360" y2="330" stroke="currentColor" color="#ccc"
        stroke-dasharray="2 5" opacity="0.6"/>

  <!-- ===================== LEFT: without Pomerium ===================== -->
  <text class="heading" x="30" y="28" font-size="17">Without Pomerium</text>

  <!-- internet -->
  <text class="ink" x="30" y="120" font-size="14">Public internet</text>
  <text class="ink" x="30" y="138" font-size="11" opacity="0.8">anyone, unauthenticated</text>

  <!-- arrow straight to app (accent = exposed) -->
  <line class="accent-stroke" x1="150" y1="115" x2="232" y2="115" stroke-width="2"/>
  <polygon class="accent" points="232,115 222,110 222,120"/>
  <text class="accent" x="160" y="106" font-size="11">exposed</text>

  <!-- paperless app box -->
  <rect class="box" x="234" y="86" width="96" height="58" rx="4" stroke-width="1.5"/>
  <text x="282" y="112" font-size="13" text-anchor="middle">Paperless</text>
  <text x="282" y="130" font-size="11" text-anchor="middle" opacity="0.85">Django login</text>

  <text class="ink" x="30" y="210" font-size="11.5" opacity="0.9">The app's own login is</text>
  <text class="ink" x="30" y="226" font-size="11.5" opacity="0.9">the only barrier. Scanners</text>
  <text class="ink" x="30" y="242" font-size="11.5" opacity="0.9">and brute force hit it directly.</text>

  <!-- ===================== RIGHT: with Pomerium ===================== -->
  <text class="heading" x="390" y="28" font-size="17">With Pomerium</text>

  <!-- internet -->
  <text class="ink" x="390" y="120" font-size="14">Public internet</text>

  <!-- arrow to pomerium -->
  <line class="ink-stroke" x1="498" y1="115" x2="528" y2="115" stroke-width="1.5"/>
  <polygon class="ink" points="528,115 519,110 519,120"/>

  <!-- pomerium gate (accent) -->
  <rect class="accent-stroke" x="530" y="86" width="96" height="58" rx="4" stroke-width="2"/>
  <text class="accent" x="578" y="110" font-size="13" text-anchor="middle">Pomerium</text>
  <text class="accent" x="578" y="128" font-size="10.5" text-anchor="middle">front-door gate</text>

  <!-- IdP / policy below the gate -->
  <line class="ink-stroke" x1="578" y1="146" x2="578" y2="186" stroke-width="1.2"/>
  <polygon class="ink" points="578,186 573,177 583,177"/>
  <text class="ink" x="578" y="206" font-size="11" text-anchor="middle">IdP + policy</text>
  <text class="ink" x="578" y="221" font-size="10" text-anchor="middle" opacity="0.8">SSO, groups, audit</text>

  <!-- arrow from gate to app (only allowed) -->
  <line class="ink-stroke" x1="578" y1="244" x2="578" y2="276" stroke-width="1.5"/>
  <polygon class="ink" points="578,276 573,267 583,267"/>
  <text class="ink" x="592" y="264" font-size="10" opacity="0.85">allowed only</text>

  <!-- paperless app box (now behind the gate) -->
  <rect class="box" x="530" y="278" width="96" height="52" rx="4" stroke-width="1.5"/>
  <text x="578" y="300" font-size="13" text-anchor="middle">Paperless</text>
  <text x="578" y="317" font-size="10.5" text-anchor="middle" opacity="0.85">Django login</text>

  <text class="ink" x="390" y="180" font-size="11.5" opacity="0.9">Pomerium authenticates</text>
  <text class="ink" x="390" y="196" font-size="11.5" opacity="0.9">every request and applies</text>
  <text class="ink" x="390" y="212" font-size="11.5" opacity="0.9">policy before Paperless is</text>
  <text class="ink" x="390" y="228" font-size="11.5" opacity="0.9">ever reached. The app keeps</text>
  <text class="ink" x="390" y="244" font-size="11.5" opacity="0.9">its own login behind the gate.</text>
</svg>
