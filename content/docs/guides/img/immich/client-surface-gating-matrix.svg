<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380" role="img" aria-labelledby="title desc" font-family="Palatino, 'Palatino Linotype', 'Book Antiqua', Georgia, serif">
  <title id="title">Which Immich client surfaces a Pomerium SSO gate actually covers</title>
  <desc id="desc">A matrix of three Immich client surfaces against two outcomes. The web browser is gated by Pomerium single sign-on. The mobile app and the API or command-line interface use their own Immich access tokens, so they bypass the browser SSO gate and reach Immich's own authentication directly. Gating the API host therefore breaks the mobile app.</desc>
  <style>
    .bg { fill: #fffff8; }
    .ink { fill: #1a1a1a; }
    .muted { fill: #666; }
    .rule { stroke: #ccc; stroke-width: 1; }
    .accent { fill: #b3261e; }
    .accent-rule { stroke: #b3261e; stroke-width: 1.5; }
    .cell-gated { fill: #f1f4f1; }
    .cell-bypass { fill: #fbeceb; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151515; }
      .ink { fill: #e6e6e6; }
      .muted { fill: #a0a0a0; }
      .rule { stroke: #444; }
      .accent { fill: #fc8d62; }
      .accent-rule { stroke: #fc8d62; }
      .cell-gated { fill: #1e241e; }
      .cell-bypass { fill: #2a1d1b; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="720" height="380"/>

  <!-- Title and subtitle -->
  <text class="ink" x="40" y="42" font-size="20" font-weight="bold">Pomerium SSO gates the browser, not Immich's tokens</text>
  <text class="muted" x="40" y="66" font-size="13">Each Immich client surface and whether it is forced through the Pomerium single sign-on (SSO) gate</text>

  <!-- Column headers -->
  <text class="ink" x="370" y="110" font-size="14" font-weight="bold" text-anchor="middle">Gated by Pomerium SSO</text>
  <text class="accent" x="560" y="110" font-size="14" font-weight="bold" text-anchor="middle">Bypasses to Immich auth</text>

  <!-- Header underline (range-framed under the two columns) -->
  <line class="rule" x1="280" y1="120" x2="460" y2="120"/>
  <line class="accent-rule" x1="480" y1="120" x2="640" y2="120"/>

  <!-- Row 1: Web browser -->
  <rect class="cell-gated" x="290" y="138" width="160" height="44" rx="3"/>
  <text class="ink" x="40" y="166" font-size="14" font-weight="bold">Web browser</text>
  <text class="muted" x="40" y="184" font-size="11">app.immich at the web UI host</text>
  <text class="ink" x="370" y="165" font-size="15" text-anchor="middle">Yes</text>
  <text class="muted" x="370" y="181" font-size="10.5" text-anchor="middle">interactive OIDC login</text>
  <text class="muted" x="560" y="165" font-size="13" text-anchor="middle">&#8212;</text>

  <line class="rule" x1="40" y1="200" x2="660" y2="200"/>

  <!-- Row 2: Mobile app -->
  <rect class="cell-bypass" x="480" y="218" width="160" height="44" rx="3"/>
  <text class="ink" x="40" y="246" font-size="14" font-weight="bold">Mobile app</text>
  <text class="muted" x="40" y="264" font-size="11">iOS / Android, access token</text>
  <text class="muted" x="370" y="245" font-size="13" text-anchor="middle">&#8212;</text>
  <text class="accent" x="560" y="245" font-size="15" text-anchor="middle">Yes</text>
  <text class="muted" x="560" y="261" font-size="10.5" text-anchor="middle">no browser SSO; gating breaks it</text>

  <line class="rule" x1="40" y1="280" x2="660" y2="280"/>

  <!-- Row 3: API / CLI -->
  <rect class="cell-bypass" x="480" y="298" width="160" height="44" rx="3"/>
  <text class="ink" x="40" y="326" font-size="14" font-weight="bold">API / CLI</text>
  <text class="muted" x="40" y="344" font-size="11">scripts, immich-go, integrations</text>
  <text class="muted" x="370" y="325" font-size="13" text-anchor="middle">&#8212;</text>
  <text class="accent" x="560" y="325" font-size="15" text-anchor="middle">Yes</text>
  <text class="muted" x="560" y="341" font-size="10.5" text-anchor="middle">API key in header, not a cookie</text>

  <!-- Direct annotation, no legend -->
  <text class="accent" x="40" y="372" font-size="11.5" font-style="italic">Token-based clients reach Immich's own auth directly, so gate the web UI and choose an API-host policy deliberately.</text>
</svg>
