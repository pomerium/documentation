<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" role="img" aria-labelledby="title desc">
  <title id="title">Which Jellyfin clients a host-root Pomerium gate covers</title>
  <desc id="desc">A matrix of three Jellyfin client surfaces. Browser web clients pass through the Pomerium single sign-on gate and are protected. Native TV, Chromecast, and mobile apps authenticate directly to Jellyfin's API with Jellyfin tokens and bypass the browser gate, so they break when the whole host is gated. Direct API and third-party clients also bypass the gate.</desc>
  <style>
    .bg { fill: #fffff8; }
    .fg { fill: #1a1a1a; }
    .muted { fill: #666; }
    .accent { fill: #b3261e; }
    .accent-stroke { stroke: #b3261e; }
    .rule { stroke: #999; }
    .serif { font-family: Georgia, "Palatino Linotype", Palatino, "Book Antiqua", serif; }
    .sans { font-family: system-ui, -apple-system, sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151515; }
      .fg { fill: #e6e6e6; }
      .muted { fill: #9a9a9a; }
      .accent { fill: #fc8d62; }
      .accent-stroke { stroke: #fc8d62; }
      .rule { stroke: #555; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="720" height="360"/>

  <!-- Title -->
  <text class="serif fg" x="36" y="44" font-size="21">Gating the whole host covers the browser, not the apps</text>
  <text class="serif muted" x="36" y="66" font-size="13">Jellyfin client surface vs. a host-root Pomerium single sign-on (SSO) gate</text>

  <!-- Column headers -->
  <text class="sans muted" x="300" y="104" font-size="12" text-anchor="middle" letter-spacing="0.04em">REACHES SSO GATE</text>
  <text class="sans muted" x="560" y="104" font-size="12" text-anchor="middle" letter-spacing="0.04em">PROTECTED BY POMERIUM</text>

  <!-- Header rule -->
  <line class="rule" x1="36" y1="116" x2="684" y2="116" stroke-width="1"/>

  <!-- Row 1: Browser web client -->
  <text class="serif fg" x="36" y="158" font-size="15">Browser web client</text>
  <text class="serif muted" x="36" y="176" font-size="11.5">app.jellyfin in any browser</text>
  <text class="serif accent" x="300" y="162" font-size="14" text-anchor="middle" font-weight="bold">yes</text>
  <text class="serif accent" x="560" y="162" font-size="14" text-anchor="middle" font-weight="bold">yes &#10003;</text>

  <line class="rule" x1="36" y1="194" x2="684" y2="194" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- Row 2: Native TV / Chromecast / mobile -->
  <text class="serif fg" x="36" y="236" font-size="15">Native TV, Chromecast, mobile apps</text>
  <text class="serif muted" x="36" y="254" font-size="11.5">authenticate directly with Jellyfin tokens</text>
  <text class="serif muted" x="300" y="240" font-size="14" text-anchor="middle">no</text>
  <text class="serif accent" x="560" y="240" font-size="14" text-anchor="middle" font-weight="bold">no &#10007;</text>

  <line class="rule" x1="36" y1="272" x2="684" y2="272" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- Row 3: Direct API / third-party -->
  <text class="serif fg" x="36" y="314" font-size="15">Direct API and third-party clients</text>
  <text class="serif muted" x="36" y="332" font-size="11.5">scripts, Infuse, sync tools</text>
  <text class="serif muted" x="300" y="318" font-size="14" text-anchor="middle">no</text>
  <text class="serif accent" x="560" y="318" font-size="14" text-anchor="middle" font-weight="bold">no &#10007;</text>

  <!-- Annotation: the gap that matters -->
  <line class="accent-stroke" x1="624" y1="232" x2="660" y2="232" stroke-width="1" stroke-dasharray="3 3"/>
  <text class="serif accent" x="664" y="236" font-size="11.5" font-style="italic">breaks if host-gated</text>
</svg>
