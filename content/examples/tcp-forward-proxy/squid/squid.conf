http_port 3128

acl SSL_ports port 443
acl CONNECT method CONNECT
acl pomerium_edge dstdomain proxy.localhost.pomerium.io

# Lab-only: allow CONNECT tunnels to the Pomerium edge on 443 and nothing else.
# Do not ship an open forward proxy.
http_access allow CONNECT SSL_ports pomerium_edge
http_access deny all

access_log stdio:/var/log/squid/access.log squid
cache deny all
cache_log /dev/null
