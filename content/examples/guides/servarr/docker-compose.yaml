services:
  pomerium:
    image: pomerium/pomerium@sha256:e10d1d267af24f581157f485d9b0bc08469e2428675b696a08e42ceb09b2279c # v0.32.7
    volumes:
      - ./config.yaml:/pomerium/config.yaml:ro
      - pomerium-cache:/data
    ports:
      - 443:443
      - 80:80
    # Pomerium bridges both networks: `default` for autocert/Let's Encrypt and the
    # hosted authenticate service, and `servarr-internal` to reach the apps.
    networks:
      - default
      - servarr-internal
    restart: always

  sonarr:
    image: lscr.io/linuxserver/sonarr@sha256:0b3f344388bd7bed4f2f770058de795e76447e4a481b83c8d5f8fed489371fde # 4.0.17
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    volumes:
      - sonarr-config:/config
    networks:
      - servarr-internal
    restart: always

  radarr:
    image: lscr.io/linuxserver/radarr@sha256:c0a4335d4249b46102f64cf6fa27ffc3bddfd9138fac1e4ddf238afd37f02d1f # 6.1.1
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    volumes:
      - radarr-config:/config
    networks:
      - servarr-internal
    restart: always

  prowlarr:
    image: lscr.io/linuxserver/prowlarr@sha256:2489c6dbaf11e3a6d71aeb2e6980d04193d4af611aa7064a974851222fd41722 # 2.3.5
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    volumes:
      - prowlarr-config:/config
    networks:
      - servarr-internal
    restart: always

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd@sha256:3de84922d3b4c5e7062b3cbd1e08f57d8dc113a8be4dc0447d33e2da293bab26 # 5.0.3
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    volumes:
      - sabnzbd-config:/config
    networks:
      - servarr-internal
    restart: always

networks:
  # The *arr apps publish no host ports, so Pomerium (which shares this network) is
  # the only way in. Outbound access stays enabled so the apps can reach indexers,
  # metadata providers, and Usenet servers.
  servarr-internal: {}

volumes:
  pomerium-cache:
  sonarr-config:
  radarr-config:
  prowlarr-config:
  sabnzbd-config:
