# Routes-only validation config. Shared settings (IdP, secrets, signing key, certs)
# come from ../../_harness/pomerium/validation.env via env_file in compose.validate.yaml.
# Forgejo consumes the forwarded claim headers, so jwt_claims_headers lives here.
jwt_claims_headers:
  X-Pomerium-Sub: sub
  X-Pomerium-Claim-Email: email
  X-Pomerium-Claim-Name: name

routes:
  - from: https://forgejo.localhost.pomerium.io
    to: http://forgejo:3000
    pass_identity_headers: true
    timeout: 0s
    idle_timeout: 600s
    policy:
      - allow:
          or:
            - authenticated_user: true
