# Validation-only Pomerium config for the AdGuard Home guide: self-hosted
# authenticate + in-network Keycloak so the full SSO flow runs sealed. The published
# guide uses the hosted authenticate service instead (see ../config.yaml.md).
# Test-only. Never use these secrets in production.

address: :443
authenticate_service_url: https://authenticate.localhost.pomerium.io

idp_provider: oidc
idp_provider_url: http://keycloak.localhost.pomerium.io:8080/realms/pomerium-e2e
idp_client_id: pomerium
idp_client_secret: pomerium-e2e-secret
idp_scopes:
  - openid
  - profile
  - email
  - groups

certificate_file: /certs/pomerium.crt
certificate_key_file: /certs/pomerium.key

cookie_secret: dj5y7E03ULP9YebCgHNIXmxWnWfYlVXCgwbm9IEdysI=
shared_secret: 0CdEkgO02jgxmgSC2AdkqIbFELAN4CGw0v0RY85xNr4=

log_level: info

routes:
  - from: https://ad-guard.localhost.pomerium.io
    to: http://adguard:3000
    allow_websockets: true
    # AdGuard has no SSO; it trusts one static basic-auth credential. Pomerium
    # injects it on every upstream request once the user is authenticated, so
    # AdGuard auto-authenticates and never shows its own login. The value below is
    # base64("admin:pomerium-e2e-adguard"), matching the seeded bcrypt user.
    set_request_headers:
      Authorization: Basic YWRtaW46cG9tZXJpdW0tZTJlLWFkZ3VhcmQ=
    policy:
      - allow:
          or:
            - authenticated_user: true
