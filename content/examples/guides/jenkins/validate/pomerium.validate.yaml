# Validation-only Pomerium config for the Jenkins guide: self-hosted authenticate +
# in-network Keycloak so the full SSO flow runs sealed. The published guide uses the
# hosted authenticate service instead (see ../config.yaml.md).
# Test-only. Never use these secrets in production.

address: :443
authenticate_service_url: https://authenticate.localhost.pomerium.io

idp_provider: oidc
idp_provider_url: http://keycloak.localhost.pomerium.io:8080/realms/pomerium-e2e
idp_client_id: pomerium
idp_client_secret: pomerium-e2e-secret
idp_scopes:
  - openid
  - profile
  - email
  - groups

certificate_file: /certs/pomerium.crt
certificate_key_file: /certs/pomerium.key

cookie_secret: dj5y7E03ULP9YebCgHNIXmxWnWfYlVXCgwbm9IEdysI=
shared_secret: 0CdEkgO02jgxmgSC2AdkqIbFELAN4CGw0v0RY85xNr4=

# Stable signing key so Pomerium publishes a JWKS that the Jenkins JWT Auth plugin
# can verify the forwarded assertion against. Test-only key (also shown in the
# Keycloak guide); never reuse in production.
signing_key: 

log_level: info

# Note: the Jenkins JWT Auth plugin consumes the signed X-Pomerium-Jwt-Assertion
# header (set by pass_identity_headers below), not individual claim headers, so this
# fixture intentionally omits jwt_claims_headers.

routes:
  - from: https://jenkins.localhost.pomerium.io
    to: http://jenkins:8080
    pass_identity_headers: true
    policy:
      - allow:
          or:
            - authenticated_user: true
