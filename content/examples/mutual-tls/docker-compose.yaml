services:
  # Reference Pomerium service. Requires real CERTIFICATE / CERTIFICATE_KEY /
  # COOKIE_SECRET and working IdP credentials in example.config.yaml; left
  # behind a Compose profile so it doesn't auto-start and crash-loop during
  # the basic curl-against-mtls demo.
  pomerium:
    image: pomerium/pomerium:latest
    profiles:
      - reference
    environment:
      - CERTIFICATE
      - CERTIFICATE_KEY
      - COOKIE_SECRET
    # Mount only the specific certs Pomerium needs for the upstream connection.
    # Mounting the whole ./out/ directory would expose CA private keys and the
    # curl test client keys that don't belong inside this container.
    volumes:
      - ./example.config.yaml:/pomerium/config.yaml:ro
      - ./out/good-ca.crt:/pomerium/out/good-ca.crt:ro
      - ./out/pomerium.crt:/pomerium/out/pomerium.crt:ro
      - ./out/pomerium.key:/pomerium/out/pomerium.key:ro
    ports:
      - 443:443

  mtls:
    build: .
    env_file:
      - ./.env
    ports:
      - 8443:8443
