apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: grafana
    grafana_dashboard: "1"
data:
  pomerium-cluster-control-room.json: |
    {
      "uid": "pomerium-cluster-control-room",
      "title": "Pomerium Cluster Control Room",
      "description": "Triage dashboard for a Pomerium-managed homelab cluster.",
      "tags": ["pomerium", "homelab", "gitops", "grafana", "control-room"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "editable": true,
      "graphTooltip": 0,
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "type": "row",
          "title": "Triage",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "stat",
          "title": "Requests/s",
          "id": 1,
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(pomerium_http_server_requests_total[5m])) OR vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Auth Success Rate",
          "id": 2,
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "((100 * sum(rate(envoy_http_ext_authz_ok[5m])) / clamp_min(sum(rate(envoy_http_ext_authz_ok[5m])) + sum(rate(envoy_http_ext_authz_denied[5m])) + sum(rate(envoy_http_ext_authz_error[5m])), 0.000001)) OR on() vector(100))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 90
                  },
                  {
                    "color": "green",
                    "value": 98
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Auth Evaluation P95",
          "id": 3,
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(pomerium_authorize_evaluator_evaluation_duration_bucket[5m])) by (le)) * 1000",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 50
                  },
                  {
                    "color": "red",
                    "value": 100
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Pomerium Pods Ready",
          "id": 4,
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{deployment=\"pomerium\",namespace=\"pomerium\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Argo Apps Degraded",
          "id": 5,
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "count(argocd_app_info{health_status=\"Degraded\"}) OR vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Pod Restarts (24h)",
          "id": 6,
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 20,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{pod=~\"pomerium-.*\"}[24h])) OR vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "row",
          "title": "Traffic and Routes",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 7
          }
        },
        {
          "type": "timeseries",
          "title": "Request Rate by Route",
          "id": 7,
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(pomerium_http_server_requests_total{host!~\"([0-9]{1,3}\\\\.){3}[0-9]{1,3}(:[0-9]+)?\"}[5m])) by (host)",
              "legendFormat": "{{host}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["mean", "last", "max"]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "type": "bargauge",
          "title": "Noisiest Routes",
          "id": 8,
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "topk(10, sum(rate(pomerium_http_server_requests_total{host!~\"([0-9]{1,3}\\\\.){3}[0-9]{1,3}(:[0-9]+)?\"}[5m])) by (host))",
              "legendFormat": "{{host}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 3
            },
            "overrides": []
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          }
        },
        {
          "type": "timeseries",
          "title": "5xx Rate by Listener",
          "id": 9,
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 17
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(envoy_http_downstream_rq_xx{code_class=\"5\"}[5m])) by (envoy_http_conn_manager_prefix)",
              "legendFormat": "{{envoy_http_conn_manager_prefix}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["mean", "last", "max"]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "type": "row",
          "title": "Runtime Health",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 26
          }
        },
        {
          "type": "timeseries",
          "title": "Pomerium Pod CPU",
          "id": 10,
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 27
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"pomerium-.*\",container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Pomerium Pod Memory",
          "id": 11,
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 27
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{pod=~\"pomerium-.*\",container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Upstream Connect Failures",
          "id": 12,
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 27
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(envoy_cluster_upstream_cx_connect_fail[5m])) by (envoy_cluster_name)",
              "legendFormat": "{{envoy_cluster_name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": ["mean", "last", "max"]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        }
      ]
    }
